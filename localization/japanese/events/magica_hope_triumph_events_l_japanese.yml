l_japanese:
 # Event 0100 - Emperor declares Hope Triumph
 magica_hope_triumph.0100.t:0 "希望よ勝て！"
 magica_hope_triumph.0100.desc.intro:0 "長年の奮闘と犠牲の末、円環の理の聖地はすべて真なる信仰のもとに戻った。今こそ世界に告げる時だ。希望は勝利し、絶望は永遠に消え去る！ この瞬間から、万物は円神（アルティメットまどか）の輝きに包まれる。\n\n"
 magica_hope_triumph.0100.desc.orthodox:0 "正統派の信徒として、慈悲と知恵で人々を救済へ導こう。"
 magica_hope_triumph.0100.desc.martial:0 "尚武派の戦士として、力と勇気で希望を阻むあらゆる闇を払おう。"
 magica_hope_triumph.0100.desc.romance:0 "浪漫派の使者として、愛と理解で世界を温かな光に浸そう。"
 magica_hope_triumph.0100.desc.generic:0 "円環の理の追随者として、世界を新たな時代へ導こう。"
 magica_hope_triumph.0100.a:0 "希望の時代が来た！"
 
 # Event 0101 - Other Magica followers conversion
 magica_hope_triumph.0101.desc.intro:0 "[scoped_emperor.GetTitledFirstName]はすべての聖地を掌握し、希望の勝利を宣言した。円環の理のすべての分派は、今や[scoped_emperor.GetHerHis]の信仰の下で団結すべきだ。\n\n"
 magica_hope_triumph.0101.desc.orthodox:0 "正統派が唯一認められる円環の理の信仰となる。"
 magica_hope_triumph.0101.desc.martial:0 "尚武派が唯一認められる円環の理の信仰となる。"
 magica_hope_triumph.0101.desc.romance:0 "浪漫派が唯一認められる円環の理の信仰となる。"
 magica_hope_triumph.0101.desc.generic:0 "[scoped_emperor.GetFaith.GetAdjective]が唯一認められる円環の理の信仰となる。"
 magica_hope_triumph.0101.a:0 "[mending_faith.GetName]へ改宗しよう。"
 magica_hope_triumph.0101.b:0 "自分の信仰を守り抜く！"
 
 # Event 0102 - Non-Magica rulers conversion (three choices)
 magica_hope_triumph.0102.desc.intro:0 "噂によれば、[scoped_emperor.GetTitledFirstName]は世界中のすべての聖地を掌握し、円環の理の希望の勝利を宣言したという。[scoped_emperor.GetSheHe]はこれを真なる神の意志だと主張し、すべての統治者に円環の理への帰依を求めている。\n\n"
 magica_hope_triumph.0102.desc.orthodox:0 "[scoped_emperor.GetSheHe]は私に正統派への参加を勧め、慈悲と知恵のうちに救済を求めるよう誘う。"
 magica_hope_triumph.0102.desc.martial:0 "[scoped_emperor.GetSheHe]は私に尚武派への参加を勧め、力と勇気で希望を守るよう誘う。"
 magica_hope_triumph.0102.desc.romance:0 "[scoped_emperor.GetSheHe]は私に浪漫派への参加を勧め、愛と理解のうちに光を受け入れるよう誘う。"
 magica_hope_triumph.0102.desc.generic:0 "[scoped_emperor.GetSheHe]は私に円環の理への参加を勧め、希望の祝福を受け入れるよう誘う。"
 magica_hope_triumph.0102.a:0 "正統派へ改宗しよう。"
 magica_hope_triumph.0102.b:0 "尚武派へ改宗しよう。"
 magica_hope_triumph.0102.c:0 "浪漫派へ改宗しよう。"
 magica_hope_triumph.0102.d:0 "祖先の信仰を守る。"
 
 # Event 0103 - Notify same-faith players
 magica_hope_triumph.0103.desc:0 "[scoped_emperor.GetTitledFirstName]が希望の勝利を宣言した！ 円環の理のすべての聖地はいまや[scoped_emperor.GetHerHis]の支配下にある。これは我らの信仰における偉大な勝利だ！"
 magica_hope_triumph.0103.a:0 "希望万歳！"
 
 # Event 0104 - Notify other-religion players
 magica_hope_triumph.0104.desc:0 "[scoped_emperor.GetTitledFirstName]は円環の理のすべての聖地を統一したと主張し、希望の勝利を宣言した。これは世界の信仰勢力図に深い影響を与えるだろう……"
 magica_hope_triumph.0104.a:0 "様子を見よう。"