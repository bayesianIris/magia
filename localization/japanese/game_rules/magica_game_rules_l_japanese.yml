 rule_magica_mahou_shoujo_rules:0 "魔法少女機構"

 setting_magica_mahou_shoujo_rules_enabled:0 "有効"
 setting_magica_mahou_shoujo_rules_enabled_desc:0 "標準モード。魔法少女のストレスと戦闘機構を含む、すべての魔法少女機構を有効にし、魔法少女特質の効果もすべて保持する。"

