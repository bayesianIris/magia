 setting_magica_mahou_shoujo_rules_buff_only:0 "バフのみ"
 setting_magica_mahou_shoujo_rules_buff_only_desc:0 "魔法少女特質のバフ効果のみを残し、魔法少女のストレスと戦闘機構は有効にしない。バランスに影響する可能性がある。"