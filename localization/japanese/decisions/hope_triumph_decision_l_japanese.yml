 # Hope Triumph Decision
 hope_triumph_decision:0 "希望の勝利"
 hope_triumph_decision_desc:0 "円環の理の福音は世界中に広まった。今こそ、信仰の守護者であり世界の支配者として、皆を円環の理の光の下に団結させる時だ。すべての聖地を掌握することで、希望の最終的な勝利を世界に宣言しよう。"
 hope_triumph_decision_tooltip:0 "円環の理の希望の勝利を宣言し、世界の信仰を統一する。"
 hope_triumph_decision_confirm:0 "希望の勝利"
 hope_triumph_decision_effect_tooltip:0 "円環の理が世界唯一の真理となり、他の信仰を持つすべての統治者は改宗の選択を迫られる。"
 
