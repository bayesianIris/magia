 madokamist_orthodox_desc: "正統派における円環の理の核心は、円神（アルティメットまどか）の願いを実現することにある。円神の救済によって、すべての魔法少女は彼女によって希望の永続を得て、その成果が絶望に呑まれることはない。彼らは円神の教えを広め、希望を実践することで円神の願いをより実現へ近づけ、新たな世界へと歩み出す。"
 rf_magica: "魔法少女宗教グループ"
 ### 基礎宗教名
 magica_religion: "円環の理信仰"
 magica_religion_adj: "円環の理信仰"
 magica_religion_adherent: "円環の理の信徒"
 magica_religion_adherent_plural: "円環の理の信徒"
 magica_religion_desc: "円環の理は過去、現在、そしてあらゆる可能世界を貫いている。魔法少女は希望を誓い、犠牲を道とし、やがて円神が因果を超越して永遠の救済者となる。信徒は魔法少女の導きのもと、円神の願いを実現するために尽くす。苦難を希望へ、絶望を救済へと変えるのだ。"

